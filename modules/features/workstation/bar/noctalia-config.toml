[bar]
order = [ "Primary" ]

    [bar.Primary]
    center = [ "workspaces" ]
    end = [
        "privacy",
        "cpu",
        "sysmon_cpu_temp",
        "sysmon_gpu",
        "ram",
        "tray",
        "notifications",
        "recorder",
        "tailscale",
        "network",
        "volume",
        "brightness",
        "battery",
        "clock",
        "session"
    ]
    margin_edge = 0
    margin_ends = 0
    radius = 0
    radius_bottom_left = 12
    radius_bottom_right = 12
    start = [ "launcher", "wallpaper", "active_window", "media", "weather" ]

[calendar]
enabled = true

[control_center]
sidebar = "full"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "dark_mode"

    [[control_center.shortcuts]]
    type = "nightlight"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "power_profile"

[desktop_widgets]
enabled = false

[dock]
launcher_position = "start"

[hot_corners.top_left]
action = "command"

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 5

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 300.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 600.0

[location]
auto_locate = true

[lockscreen]
allow_empty_password = true
blur_intensity = 0.99999997764825821
tint_intensity = 0.24999999441206455

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
    "lockscreen-login-box@DP-2",
    "lockscreen-login-box@DP-1",
    "lockscreen-widget-0000000000000001",
    "lockscreen-widget-0000000000000004",
    "lockscreen-widget-0000000000000005",
    "lockscreen-widget-0000000000000006",
    "lockscreen-widget-0000000000000007",
    "lockscreen-widget-0000000000000008",
    "lockscreen-widget-0000000000000009",
    "lockscreen-widget-000000000000000a"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 80.0
    box_width = 912.0
    cx = 1280.0
    cy = 1320.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-2"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-2".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 128.0
    box_width = 240.0
    cx = 1280.0
    cy = 208.0
    output = "DP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        center_text = true
        clock_style = "digital"
        format = "{:%H:%M:%S}"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000004]
    box_height = 256.0
    box_width = 320.0
    cx = 1576.0
    cy = 1104.0
    output = "DP-1"
    rotation = 0.0
    type = "fancy_audio_visualizer"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000004.settings]
        background = true
        visualization_mode = "bars_rings"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000005]
    box_height = 256.0
    box_width = 576.0
    cx = 1112.0
    cy = 1104.0
    output = "DP-1"
    rotation = 0.0
    type = "media_player"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000006]
    box_height = 80.0
    box_width = 208.0
    cx = 928.0
    cy = 912.0
    output = "DP-1"
    rotation = 0.0
    type = "button"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000006.settings]
        background = true
        glyph = "logout"
        label = "Logout"
        variant = "default"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000007]
    box_height = 96.0
    box_width = 176.0
    cx = 1280.0
    cy = 336.0
    output = "DP-1"
    rotation = 0.0
    type = "weather"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000007.settings]
        background = true
        shadow = true
        show_forecast = false

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000008]
    box_height = 80.0
    box_width = 208.0
    cx = 1160.0
    cy = 912.0
    output = "DP-1"
    rotation = 0.0
    type = "button"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000008.settings]
        background = true
        glyph = "suspend"
        label = "Suspend"
        variant = "default"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000009]
    box_height = 80.0
    box_width = 208.0
    cx = 1400.0
    cy = 912.0
    output = "DP-1"
    rotation = 0.0
    type = "button"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000009.settings]
        background = true
        glyph = "reboot"
        label = "Reboot"
        variant = "default"

    [lockscreen_widgets.widget.lockscreen-widget-000000000000000a]
    box_height = 80.0
    box_width = 208.0
    cx = 1632.0
    cy = 912.0
    output = "DP-1"
    rotation = 0.0
    type = "button"

        [lockscreen_widgets.widget.lockscreen-widget-000000000000000a.settings]
        background = true
        color = "error"
        command = ""
        font_family = ""
        glyph = "power"
        hover_background = "hover"
        label = "Shutdown"
        variant = "default"

[osd]
orientation = "vertical"
position_vertical = "top_right"

[plugin_settings."noctalia/screen_recorder"]
audio_source = "both"
filename_pattern = "recording_%Y%m%d_%H%M%S"

[plugin_settings."noctalia/tailscale"]
show_ip = false
tailscale-panel_open_near_click = true

[plugins]
enabled = [ "noctalia/screen_recorder", "noctalia/tailscale" ]

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/itsJai42/noctalia-v5-plugins"
    name = "noctalia-v5-port"

[shell]
avatar_path = "/home/gabe/.face"
clipboard_image_action_command = "satty -f {path}"
date_format = "%A, %B %e, %Y"
launch_apps_as_systemd_services = true
password_style = "random"
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = true
time_format = "{:%H:%M:%S}"

    [shell.animation]
    speed = 2.0000000298023224

    [shell.panel]
    open_near_click_control_center = true
    session_placement = "floating"
    session_position = "center"

    [shell.screenshot]
    directory = "/home/gabe/Pictures/Screenshots"

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "command"
    command = "systemctl reboot --boot-loader-entry=auto-windows"
    countdown_seconds = 0.0
    enabled = true
    glyph = "brand-windows"
    label = "Windows"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "5"
    variant = "destructive"

[theme]
builtin = "Dracula"

[wallpaper]
directory = "/home/gabe/Pictures/Wallpaper"
transition_on_startup = true

    [wallpaper.automation]
    enabled = true
    interval_seconds = 3600

    [wallpaper.default]
    path = "/home/gabe/Pictures/Wallpaper/new_beginning_4k.png"

    [wallpaper.last]
    path = "/home/gabe/Pictures/Wallpaper/new_beginning_4k.png"

    [wallpaper.monitors.DP-1]
    path = "/home/gabe/Pictures/Wallpaper/new_beginning_4k.png"

    [wallpaper.monitors.DP-2]
    path = "/home/gabe/Pictures/Wallpaper/new_beginning_4k.png"

[widget.active_window]
capsule = true
max_length = 300
title_scroll = "on_hover"

[widget.battery]
capsule = true

[widget.bluetooth]
capsule = true

[widget.brightness]
capsule = true
show_label = false

[widget.clock]
capsule = true
capsule_padding = 9
format = "{:%a, %H:%M}"
tooltip_format = "{:%A, %B %d - %H:%M:%S}"
vertical_format = "{:%H %M}"

[widget.cpu]
show_label = false

[widget.launcher]
glyph = "rocket"

[widget.media]
anchor = true
capsule = true
hide_when_no_media = true
title_scroll = "on_hover"

[widget.network]
capsule = true
show_label = false

[widget.notifications]
capsule = true

[widget.privacy]
capsule = true
hide_inactive = true

[widget.ram]
show_label = false

[widget.recorder]
capsule = true
type = "noctalia/screen_recorder:recorder"

[widget.session]
capsule = true
capsule_foreground = "error"

[widget.sysmon]
show_label = false
stat = "cpu_temp"

[widget.sysmon_cpu]
show_label = false
type = "sysmon"

[widget.sysmon_cpu_temp]
show_label = false
stat = "cpu_temp"
type = "sysmon"

[widget.sysmon_gpu]
show_label = false
stat = "gpu_usage"
type = "sysmon"

[widget.tailscale]
capsule = true
type = "noctalia/tailscale:tailscale"

[widget.tray]
capsule = true
drawer = true
drawer_columns = 5
pinned = [ "indicator_solaar" ]

[widget.volume]
capsule = true

[widget.workspaces]
capsule = true
hide_when_empty = true
